name: VokabelApp
options:
  bundleIdPrefix: de.papa
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: Y3B24T9MUD
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "3"
    VERSIONING_SYSTEM: apple-generic
    VOKABEL_BACKEND_BASE_URL: ""
    VOKABEL_BACKEND_FALLBACK_1: ""
    VOKABEL_BACKEND_FALLBACK_2: ""
    VOKABEL_BACKEND_FALLBACK_3: ""
  configs:
    Debug:
      VOKABEL_BACKEND_BASE_URL: "http://192.168.178.79:8080"
      VOKABEL_BACKEND_FALLBACK_1: "http://169.254.1.242:8080"
      VOKABEL_BACKEND_FALLBACK_2: "http://MQ-Pro2-Papale.local:8080"
      VOKABEL_BACKEND_FALLBACK_3: "http://Work-Mac.local:8080"
    Release:
      VOKABEL_BACKEND_BASE_URL: ""
      VOKABEL_BACKEND_FALLBACK_1: ""
      VOKABEL_BACKEND_FALLBACK_2: ""
      VOKABEL_BACKEND_FALLBACK_3: ""
targets:
  VokabelCore:
    type: framework
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources/VokabelCore
    resources:
      - Sources/VokabelCore/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.papa.vokabelapp.core
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic

  VokabelApp:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources/VokabelApp
    dependencies:
      - target: VokabelCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.papa.vokabelapp
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/VokabelApp.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
