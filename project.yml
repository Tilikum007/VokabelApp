name: VokabelApp
options:
  bundleIdPrefix: de.papa
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: Y3B24T9MUD
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 9.0.0
targets:
  VokabelCore:
    type: framework
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources/VokabelCore
    resources:
      - Sources/VokabelCore/Resources
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.papa.vokabelapp.core
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic

  VokabelApp:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources/VokabelApp
    dependencies:
      - target: VokabelCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.papa.vokabelapp
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/VokabelApp.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/Frameworks"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
